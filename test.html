    .fail { color: #f44; font-weight: bold; }
    .suite { margin-top: 1.5em; color: #aaf; font-size: 1.1em; }
    #results { white-space: pre-wrap; }
    #summary { margin-top: 2em; font-size: 1.2em; padding: 1em; border-radius: 4px; }
    #summary.all-pass { background: #0a3a0a; color: #0f0; }
    #summary.has-fail { background: #3a0a0a; color: #f44; }

    const results = document.getElementById("results");
    const summary = document.getElementById("summary");
    let passed = 0;
    let failed = 0;

    function addSuite(name) {
      const el = document.createElement("div");
      el.className = "suite";
      el.textContent = "--- " + name + " ---";
      results.appendChild(el);
    }

    function assert(description, actual, expected) {
      const el = document.createElement("div");
      if (actual === expected) {
        el.className = "pass";
        el.textContent = "PASS: " + description;
        passed++;
      } else {
        el.className = "fail";
        el.textContent = "FAIL: " + description;
        results.appendChild(el);
        const detail = document.createElement("div");
        detail.className = "fail";
        detail.textContent = "  expected: " + JSON.stringify(expected) + "\n  actual:   " + JSON.stringify(actual);
        results.appendChild(detail);
        failed++;
        return;
      }
      results.appendChild(el);
    }

    function assertIncludes(description, haystack, needle) {
      const el = document.createElement("div");
      if (haystack.includes(needle)) {
        el.className = "pass";
        el.textContent = "PASS: " + description;
        passed++;
      } else {
        el.className = "fail";
        el.textContent = "FAIL: " + description + " (string does not include expected substring)";
        results.appendChild(el);
        const detail = document.createElement("div");
        detail.className = "fail";
        detail.textContent = "  looking for: " + JSON.stringify(needle) + "\n  in: " + JSON.stringify(haystack.substring(0, 300));
        results.appendChild(detail);
        failed++;
        return;
      }
      results.appendChild(el);
    }

    function assertNotIncludes(description, haystack, needle) {
      const el = document.createElement("div");
      if (!haystack.includes(needle)) {
        el.className = "pass";
        el.textContent = "PASS: " + description;
        passed++;
      } else {
        el.className = "fail";
        el.textContent = "FAIL: " + description + " (string should NOT include substring but does)";
        results.appendChild(el);
        const detail = document.createElement("div");
        detail.className = "fail";
        detail.textContent = "  should not contain: " + JSON.stringify(needle);
        results.appendChild(detail);
        failed++;
        return;
      }
      results.appendChild(el);
    }

    function assertThrows(description, fn) {
      const el = document.createElement("div");
      try {
        fn();
        el.className = "fail";
        el.textContent = "FAIL: " + description + " (expected throw but none occurred)";
        failed++;
      } catch (e) {
        el.className = "pass";
        el.textContent = "PASS: " + description;
        passed++;
      }
      results.appendChild(el);
    }

    function assertNoThrow(description, fn) {
      const el = document.createElement("div");
      try {
        fn();
        el.className = "pass";
        el.textContent = "PASS: " + description;
        passed++;
      } catch (e) {
        el.className = "fail";
        el.textContent = "FAIL: " + description + " (unexpected throw: " + e.message + ")";
        failed++;
      }
      results.appendChild(el);
    }

    assert("underscores", sanitizeImageName("my_app"), "my.app");

      copyFrom: [{ image: "node:20-alpine", src: "/usr/local/bin/node", dest: "/usr/local/bin/node" }],
      services: [
        { name: "api", command: "node server.js", internalPort: 3000, routePath: "/api" },
        { name: "frontend", command: "nginx -g 'daemon off;'", internalPort: 4000, routePath: "/app" },
      ],
    };

    assertNoThrow("complex: generateDockerfile succeeds", () => generateDockerfile(complexConfig));
    assertNoThrow("complex: generateStartSh succeeds", () => generateStartSh(complexConfig));
    assertNoThrow("complex: generateNginxConf succeeds", () => generateNginxConf(complexConfig));
    assertNoThrow("complex: generateManifest succeeds", () => generateManifest(complexConfig));

    // ========================================
    // Phase 3: New manifest fields
    // ========================================
    addSuite("Phase 3 — new manifest fields");

    const phase3Config = {
      ...safeConfig,
      httpPorts: [{ name: "API", title: "API Port", containerPort: 9000, defaultValue: 9000 }],
      checklist: ["Change admin password", "Enable 2FA"],
      logPaths: ["/app/data/logs/app.log"],
      secondarySubdomains: ["api", "admin"],
      fullDomain: true,
      singleUser: true,
      maxBoxVersion: "9.0.0",
      targetBoxVersion: "8.0.0",
    };
    const p3Manifest = JSON.parse(generateManifest(phase3Config));
    assert("manifest: httpPorts present", !!p3Manifest.httpPorts, true);
    assert("manifest: httpPorts API port", p3Manifest.httpPorts.API.containerPort, 9000);
    assert("manifest: checklist is object", typeof p3Manifest.checklist, "object");
    assert("manifest: checklist has keys", Object.keys(p3Manifest.checklist).length, 2);
    assert("manifest: checklist item has message", p3Manifest.checklist["change_admin_password"].message, "Change admin password");
    assert("manifest: logPaths present", p3Manifest.logPaths[0], "/app/data/logs/app.log");
    assert("manifest: secondarySubdomains", p3Manifest.secondarySubdomains.length, 2);
    assert("manifest: fullDomain", p3Manifest.fullDomain, true);
    assert("manifest: singleUser", p3Manifest.singleUser, true);
    assert("manifest: maxBoxVersion", p3Manifest.maxBoxVersion, "9.0.0");
    assert("manifest: targetBoxVersion", p3Manifest.targetBoxVersion, "8.0.0");

    // oauth and simpleauth SSO addons
    const oauthConfig = { ...safeConfig, sso: "oauth" };
    const oauthManifest = JSON.parse(generateManifest(oauthConfig));
    assert("manifest: oauth addon", "oauth" in oauthManifest.addons, true);

    const simpleauthConfig = { ...safeConfig, sso: "simpleauth" };
    const saManifest = JSON.parse(generateManifest(simpleauthConfig));
    assert("manifest: simpleauth addon", "simpleauth" in saManifest.addons, true);

    // localstorage sub-options
    const lsConfig = { ...safeConfig, addons: ["localstorage"], localstorageFtp: true, localstorageSqlite: true, localstorageSqlitePaths: ["db.sqlite"] };
    const lsManifest = JSON.parse(generateManifest(lsConfig));
    assert("manifest: localstorage ftp", lsManifest.addons.localstorage.ftp, true);
    assert("manifest: localstorage sqlite", lsManifest.addons.localstorage.sqlite[0], "db.sqlite");

    // ========================================
    // Phase 3: Publishing stubs
    // ========================================
    addSuite("Phase 3 — publishing stubs");

    const postInstall = generatePostInstall({ title: "TestApp", checklist: ["Do X", "Do Y"], configurePath: "/admin" });
    assertIncludes("postinstall: title", postInstall, "TestApp");
    assertIncludes("postinstall: checklist item", postInstall, "- [ ] Do X");
    assertIncludes("postinstall: configure path", postInstall, "/admin");

    const changelog = generateChangelog({ version: "2.0.0" });
    assertIncludes("changelog: version", changelog, "## 2.0.0");
    assertIncludes("changelog: initial", changelog, "Initial Cloudron package");

    // ========================================
    // Stack-specific start.sh templates
    // ========================================
    addSuite("Stack-specific start.sh templates");

    const nodejsConfig = { ...safeConfig, stack: "nodejs" };
    const nodejsSh = generateStartSh(nodejsConfig);
    assertIncludes("nodejs: node command", nodejsSh, "node /app/code/server.js");
    assertNotIncludes("nodejs: no YOUR_APP_COMMAND", nodejsSh, "YOUR_APP_COMMAND");

    const phpConfig = { ...safeConfig, stack: "php" };
    const phpSh = generateStartSh(phpConfig);
    assertIncludes("php: apache2-foreground", phpSh, "apache2-foreground");

    const javaConfig = { ...safeConfig, stack: "java" };
    const javaSh = generateStartSh(javaConfig);
    assertIncludes("java: MaxRAMPercentage", javaSh, "MaxRAMPercentage");
    assertIncludes("java: app.jar", javaSh, "app.jar");

    const goConfig = { ...safeConfig, stack: "go" };
    const goSh = generateStartSh(goConfig);
    assertIncludes("go: /app/code/server", goSh, "/app/code/server");

    const pythonConfig = { ...safeConfig, stack: "python" };
    const pythonSh = generateStartSh(pythonConfig);
    assertIncludes("python: python3 /app/code/app.py", pythonSh, "python3 /app/code/app.py");

    const genericConfig = { ...safeConfig, stack: "" };
    const genericSh = generateStartSh(genericConfig);
    assertIncludes("generic: YOUR_APP_COMMAND placeholder", genericSh, "YOUR_APP_COMMAND");

    // ========================================
    // Env var reference in README
    // ========================================
    addSuite("Env var reference in README");

    const pgReadme = generateReadme({ ...safeConfig, database: "postgresql" });
    assertIncludes("readme: CLOUDRON_POSTGRESQL_URL", pgReadme, "CLOUDRON_POSTGRESQL_URL");

    const mysqlReadme = generateReadme({ ...safeConfig, database: "mysql" });
    assertIncludes("readme: CLOUDRON_MYSQL_URL", mysqlReadme, "CLOUDRON_MYSQL_URL");

    const oidcReadme = generateReadme({ ...safeConfig, sso: "oidc" });
    assertIncludes("readme: CLOUDRON_OIDC_CLIENT_ID", oidcReadme, "CLOUDRON_OIDC_CLIENT_ID");

    const ldapReadme = generateReadme({ ...safeConfig, sso: "ldap" });
    assertIncludes("readme: CLOUDRON_LDAP_URL", ldapReadme, "CLOUDRON_LDAP_URL");

    const smReadme = generateReadme({ ...safeConfig, addons: ["sendmail"] });
    assertIncludes("readme: CLOUDRON_MAIL_SMTP_SERVER", smReadme, "CLOUDRON_MAIL_SMTP_SERVER");

    const lsReadme = generateReadme({ ...safeConfig, addons: ["localstorage"] });
    assertIncludes("readme: /app/data", lsReadme, "/app/data");

    const noEnvReadme = generateReadme({ ...safeConfig, database: null, sso: null, addons: [] });
    assertNotIncludes("readme: no env section without addons", noEnvReadme, "Environment Variables");

    // ========================================
    // DooD mode (sub-containers)
    // ========================================
    addSuite("DooD mode — sub-containers");

    const doodConfig = {
      ...safeConfig,
      subcontainers: [
        { image: "n8nio/n8n", port: 5678, route: "/n8n", memory: 512, volume: "/home/node/.n8n" },
        { image: "kennethreitz/httpbin", port: 80, route: "/api", memory: 256, volume: "/data" },
      ],
    };

    // Dockerfile includes Docker CLI
    const doodDockerfile = generateDockerfile(doodConfig);
    assertIncludes("dood: Dockerfile has Docker CLI", doodDockerfile, "docker-27");
    assertIncludes("dood: Dockerfile verifies Docker CLI checksum", doodDockerfile, "sha256sum -c -");
    assertIncludes("dood: Dockerfile pins Docker CLI SHA256", doodDockerfile, "4f798b3ee1e0140eab5bf30b0edc4e84f4cdb53255a429dc3bbae9524845d640");
    assertIncludes("dood: Dockerfile has nginx", doodDockerfile, "nginx");
    assertIncludes("dood: Dockerfile has nginx template", doodDockerfile, "nginx.conf.template");

    // start.sh has docker run commands
    const doodStartSh = generateStartSh(doodConfig);
    assertIncludes("dood: start.sh exports DOCKER_HOST", doodStartSh, "CLOUDRON_DOCKER_HOST");
    assertIncludes("dood: start.sh runs n8n", doodStartSh, "n8nio/n8n");
    assertIncludes("dood: start.sh has memory limit", doodStartSh, "--memory=512m");
    assertIncludes("dood: start.sh has volume mount", doodStartSh, "/app/data/fp-n8nio-n8n");
    assertIncludes("dood: start.sh discovers IP", doodStartSh, "docker inspect");
    assertIncludes("dood: start.sh renders nginx template", doodStartSh, "nginx.conf.template");
    assertIncludes("dood: start.sh has cleanup trap", doodStartSh, "trap cleanup");

    // nginx.conf has placeholders
    const doodNginx = generateNginxConf(doodConfig);
    assertIncludes("dood: nginx has n8n placeholder", doodNginx, "FP_N8NIO_N8N_IP");
    assertIncludes("dood: nginx has httpbin placeholder", doodNginx, "FP_KENNETHREITZ_HTTPBIN_IP");
    assertIncludes("dood: nginx routes /n8n/", doodNginx, "location /n8n/");
    assertIncludes("dood: nginx routes /api/", doodNginx, "location /api/");
    assertIncludes("dood: nginx has websocket upgrade", doodNginx, "Upgrade");
    assertThrows("dood: rejects shell injection in volume", () =>
      generateStartSh({
        ...doodConfig,
        subcontainers: [{ image: "nginx:latest", port: 80, route: "/", memory: 256, volume: "/data;touch" }],
      }));
    assertThrows("dood: rejects nginx injection in route", () =>
      generateNginxConf({
        ...doodConfig,
        subcontainers: [{ image: "nginx:latest", port: 80, route: "/api;return 200", memory: 256, volume: "/data" }],
      }));
    assertThrows("dood: rejects unsafe upstream port", () =>
      generateNginxConf({
        ...doodConfig,
        subcontainers: [{ image: "nginx:latest", port: 70000, route: "/", memory: 256, volume: "/data" }],
      }));

    // manifest has docker addon
    const doodManifest = JSON.parse(generateManifest(doodConfig));
    assert("dood: manifest has docker addon", "docker" in doodManifest.addons, true);

    // No DooD without subcontainers
    const noDoodConfig = { ...safeConfig, subcontainers: [] };
    const noDoodDockerfile = generateDockerfile(noDoodConfig);
    assertNotIncludes("no-dood: Dockerfile has no Docker CLI", noDoodDockerfile, "docker-27");

    // ========================================
    // Summary
    // ========================================
    const total = passed + failed;
    const summaryText = passed + "/" + total + " tests passed" + (failed > 0 ? ", " + failed + " FAILED" : "");
    const summaryEl = document.createTextNode(summaryText);
    summary.appendChild(summaryEl);
    if (failed === 0) {
      summary.className = "all-pass";
      summary.dataset.status = "pass";
    } else {
      summary.className = "has-fail";
      summary.dataset.status = "fail";
    }
  </script>
</body>
</html>
