    .fail { color: #f44; font-weight: bold; }

    #results { white-space: pre-wrap; }
    #summary { margin-top: 2em; font-size: 1.2em; padding: 1em; border-radius: 4px; }

    function addSuite(name) {
      const el = document.createElement("div");
      el.className = "suite";
      el.textContent = "--- " + name + " ---";
      results.appendChild(el);
    }

    function assert(description, actual, expected) {
      const el = document.createElement("div");
      if (actual === expected) {
        el.className = "pass";
        el.textContent = "PASS: " + description;
        passed++;
      } else {
        el.className = "fail";
        el.textContent = "FAIL: " + description;
        results.appendChild(el);
        const detail = document.createElement("div");
        detail.className = "fail";
        detail.textContent = "  expected: " + JSON.stringify(expected) + "\n  actual:   " + JSON.stringify(actual);
        results.appendChild(detail);
        failed++;
        return;
      }
      results.appendChild(el);
    }

    function assertIncludes(description, haystack, needle) {
      const el = document.createElement("div");
      if (haystack.includes(needle)) {
        el.className = "pass";
        el.textContent = "PASS: " + description;
        passed++;
      } else {
        el.className = "fail";
        el.textContent = "FAIL: " + description + " (string does not include expected substring)";
        results.appendChild(el);
        const detail = document.createElement("div");
        detail.className = "fail";
        detail.textContent = "  looking for: " + JSON.stringify(needle) + "\n  in: " + JSON.stringify(haystack.substring(0, 300));
        results.appendChild(detail);
        failed++;
        return;
      }
      results.appendChild(el);
    }

    function assertNotIncludes(description, haystack, needle) {
      const el = document.createElement("div");
      if (!haystack.includes(needle)) {
        el.className = "pass";
        el.textContent = "PASS: " + description;
        passed++;
      } else {
        el.className = "fail";
        el.textContent = "FAIL: " + description + " (string should NOT include substring but does)";
        results.appendChild(el);
        const detail = document.createElement("div");
        detail.className = "fail";
        detail.textContent = "  should not contain: " + JSON.stringify(needle);
        results.appendChild(detail);
        failed++;
        return;
      }
      results.appendChild(el);
    }

    // ========================================

    assert("hyphens and underscores", sanitizeImageName("my-cool_app"), "my.cool.app");
    assert("leading digits", sanitizeImageName("123abc"), "abc");

    assertIncludes("web: gosu shim uses su", webDockerfile, "exec su -s /bin/sh");
    assertIncludes("web: mkdir /app/code", webDockerfile, "mkdir -p /app/code");
    assertIncludes("web: creates cloudron user (groupadd)", webDockerfile, "groupadd");
    assertIncludes("web: creates cloudron user (useradd)", webDockerfile, "useradd");
    assertIncludes("web: cloudron uid 808", webDockerfile, "808");
    assertNotIncludes("web: no mkdir /app/data", webDockerfile, "/app/data");
    assertNotIncludes("web: no python3 install for web mode", webDockerfile, "Install python3");

    // TCP mode — ports always exposed + python3 installed
    const tcpDockerConfig = {
      image: "eclipse-mosquitto:2.0",
      httpPort: 8080,
      hasWebUI: false,
      tcpPorts: [{ name: "MQTT_PORT", title: "MQTT", containerPort: 1883, defaultValue: 1883 }],
      udpPorts: [],
    };
    const tcpDockerfile = generateDockerfile(tcpDockerConfig);
    assertIncludes("tcp: EXPOSE includes tcp port", tcpDockerfile, "1883");
    assertIncludes("tcp: python3 install for TCP mode", tcpDockerfile, "Install python3");

    // Web mode with extra ports
    const webWithPortsConfig = {
      image: "nginx:latest",
      httpPort: 8080,
      hasWebUI: true,
      tcpPorts: [{ name: "EXTRA_PORT", title: "Extra", containerPort: 9090, defaultValue: 9090 }],
      udpPorts: [],
    };
    const webWithPortsDockerfile = generateDockerfile(webWithPortsConfig);
    assertIncludes("web+ports: EXPOSE includes extra tcp port", webWithPortsDockerfile, "9090");

    // UDP mode
    const udpDockerConfig = {
      image: "coredns:latest",
      httpPort: 8080,
      hasWebUI: false,
      tcpPorts: [],
      udpPorts: [{ name: "DNS_PORT", title: "DNS", containerPort: 53, defaultValue: 5353 }],
    };
    const udpDockerfile = generateDockerfile(udpDockerConfig);
    assertIncludes("udp: EXPOSE uses /udp syntax", udpDockerfile, "53/udp");

    // ========================================
    // generateStartSh
    // ========================================
    addSuite("generateStartSh");

    // Web mode with localstorage
    const webStartConfig = {
      httpPort: 8080,
      hasWebUI: true,
      addons: ["localstorage"],
      version: "1.0.0",
    };
    const webStart = generateStartSh(webStartConfig);
    assertIncludes("web: shebang", webStart, "#!/bin/sh");
    assertIncludes("web: exec with gosu", webStart, "exec /usr/local/bin/gosu cloudron:cloudron YOUR_APP_COMMAND");
    assertNotIncludes("web: no python", webStart, "python");
    assertIncludes("web: chown with localstorage", webStart, "chown");
    assertIncludes("web: initialized guard", webStart, ".initialized");
    assertIncludes("web: version stored in .initialized", webStart, '"1.0.0"');

    // TCP mode without localstorage
    const tcpStartConfig = {
      httpPort: 8080,
      hasWebUI: false,
      addons: [],
      version: "1.0.0",
    };
    const tcpStart = generateStartSh(tcpStartConfig);
    assertIncludes("tcp: python healthcheck", tcpStart, "python");
    assertIncludes("tcp: minimal healthcheck (no SimpleHTTPRequestHandler)", tcpStart, "do_GET");
    assertNotIncludes("tcp: no SimpleHTTPRequestHandler", tcpStart, "SimpleHTTPRequestHandler");
    assertIncludes("tcp: wait", tcpStart, "wait");
    assertNotIncludes("tcp: no chown without localstorage", tcpStart, "chown");
    assertIncludes("tcp: signal trap", tcpStart, "trap");
    assertIncludes("tcp: gosu for service", tcpStart, "/usr/local/bin/gosu cloudron:cloudron");

    // TCP mode with localstorage
    const tcpStorageConfig = {
      httpPort: 9090,
      hasWebUI: false,
      addons: ["localstorage"],
      version: "2.0.0",
    };
    const tcpStorageStart = generateStartSh(tcpStorageConfig);
    assertIncludes("tcp+storage: python healthcheck", tcpStorageStart, "python");
    assertIncludes("tcp+storage: chown", tcpStorageStart, "chown");
    assertIncludes("tcp+storage: wait", tcpStorageStart, "wait");

    // ========================================
    // generateDescription
    // ========================================
    addSuite("generateDescription");

    assert("returns null when no description", generateDescription({ description: "" }), null);
    assert("returns null when whitespace only", generateDescription({ description: "   " }), null);
    assert("returns content with newline", generateDescription({ description: "My app description" }), "My app description\n");

    // ========================================
    // generateDockerignore
    // ========================================
    addSuite("generateDockerignore");

    const dockerignore = generateDockerignore();
    assertIncludes("has .git", dockerignore, ".git");
    assertIncludes("has README.md", dockerignore, "README.md");
    assertIncludes("has test.html", dockerignore, "test.html");
    assertIncludes("has CHANGELOG.md", dockerignore, "CHANGELOG.md");
    assertIncludes("has node_modules/", dockerignore, "node_modules/");
    assertIncludes("has .claude/", dockerignore, ".claude/");

    // ========================================
    // generateReadme
    // ========================================
    addSuite("generateReadme");

    const readmeConfig = {
      id: "com.example.test",
      title: "Test App",
      hasWebUI: true,
    };
    const readme = generateReadme(readmeConfig);
    assertIncludes("has title", readme, "# Test App");
    assertIncludes("cloudron build", readme, "cloudron build");
    assertIncludes("cloudron install (no --image flag)", readme, "cloudron install");
    // The deployment section should have bare "cloudron install" (no --image)
    // but the Alternative Build section legitimately uses --image
    const deploySection = readme.split("## Update")[0];
    assertNotIncludes("no --image in deploy section", deploySection, "cloudron install --image");
    assertIncludes("non-root caveat", readme, "non-root");
    assertIncludes("logging guidance", readme, "stdout/stderr");
    assertIncludes("alternative build methods section", readme, "Alternative Build Methods");
    assertIncludes("local docker build", readme, "docker build");
    assertIncludes("build service link", readme, "Docker Builder");
    assertNotIncludes("web: no TCP-only note", readme, "TCP-only mode");

    // TCP mode README
    const tcpReadmeConfig = {
      id: "com.example.tcp",
      title: "TCP App",
      hasWebUI: false,
    };
    const tcpReadme = generateReadme(tcpReadmeConfig);
    assertIncludes("tcp: has TCP-only note", tcpReadme, "TCP-only mode");
    assertIncludes("tcp: mentions health-check", tcpReadme, "health-check");

    // ========================================
    // generateCloudronVersions
    // ========================================
    addSuite("generateCloudronVersions");

    const versionsConfig = {
      id: "com.example.app",
      version: "1.0.0",
    };
    const versions = JSON.parse(generateCloudronVersions(versionsConfig));
    assert("versions: has version key", versions["1.0.0"] !== undefined, true);
    assertIncludes("versions: image contains id", versions["1.0.0"].image, "com.example.app");
    assertIncludes("versions: image contains version", versions["1.0.0"].image, "1.0.0");

    // ========================================
    // generateNginxConf
    // ========================================
    addSuite("generateNginxConf");

    // No services → empty string
    assert("no services: empty", generateNginxConf({ services: [] }), "");
    assert("no services key: empty", generateNginxConf({}), "");

    // Basic multi-service
    const nginxConfig = {
      httpPort: 8000,
      services: [
        { name: "app1", command: "node server.js", internalPort: 3001, routePath: "/app1", sso: "none" },
        { name: "app2", command: "python3 app.py", internalPort: 3002, routePath: "/app2", sso: "proxyAuth" },
      ],
    };
    const nginxConf = generateNginxConf(nginxConfig);
    assertIncludes("nginx: listen port", nginxConf, "listen 8000");
    assertIncludes("nginx: app1 location", nginxConf, "location /app1/");
    assertIncludes("nginx: app1 proxy_pass", nginxConf, "proxy_pass http://127.0.0.1:3001/");
    assertIncludes("nginx: app2 location", nginxConf, "location /app2/");
    assertIncludes("nginx: app2 proxy_pass", nginxConf, "proxy_pass http://127.0.0.1:3002/");
    assertIncludes("nginx: default location", nginxConf, "location / {");
    assertIncludes("nginx: writable temp paths", nginxConf, "client_body_temp_path /tmp/");
    assertIncludes("nginx: pid in /tmp", nginxConf, "pid /tmp/nginx.pid");

    // Service without route
    const tcpOnlyServiceConf = generateNginxConf({
      httpPort: 8000,
      services: [
        { name: "mqtt", command: "mosquitto", internalPort: 1883, routePath: null, sso: "none" },
        { name: "web", command: "node app.js", internalPort: 3000, routePath: "/web", sso: "none" },
      ],
    });
    assertNotIncludes("nginx: no location for null routePath", tcpOnlyServiceConf, "location /mqtt");
    assertIncludes("nginx: location for web service", tcpOnlyServiceConf, "location /web/");

    // ========================================
    // generateStartSh — multi-service
    // ========================================
    addSuite("generateStartSh — multi-service");

    const multiStartConfig = {
      httpPort: 8000,
      hasWebUI: true,
      addons: ["localstorage"],
      version: "1.0.0",
      services: [
        { name: "app1", command: "node server.js", internalPort: 3001, routePath: "/app1", sso: "none" },
        { name: "app2", command: "python3 app.py", internalPort: 3002, routePath: "/app2", sso: "proxyAuth" },
      ],
    };
    const multiStart = generateStartSh(multiStartConfig);
    assertIncludes("multi: starts app1", multiStart, "node server.js");
    assertIncludes("multi: starts app2", multiStart, "python3 app.py");
    assertIncludes("multi: starts nginx", multiStart, "nginx -c /app/code/nginx.conf");
    assertIncludes("multi: signal trap", multiStart, "trap");
    assertIncludes("multi: wait", multiStart, "wait");
    assertIncludes("multi: gosu for services", multiStart, "/usr/local/bin/gosu cloudron:cloudron");
    assertNotIncludes("multi: no YOUR_APP_COMMAND", multiStart, "YOUR_APP_COMMAND");

    // ========================================
    // generateDockerfile — multi-service
    // ========================================
    addSuite("generateDockerfile — multi-service");

    const multiDockerConfig = {
      image: "python:3-slim",
      httpPort: 8000,
      hasWebUI: true,
      tcpPorts: [],
      udpPorts: [],
      services: [
        { name: "app1", command: "python3 -m http.server 3001", internalPort: 3001, routePath: "/app1", sso: "none" },
      ],
    };
    const multiDockerfile = generateDockerfile(multiDockerConfig);
    assertIncludes("multi docker: installs nginx", multiDockerfile, "nginx");
    assertIncludes("multi docker: copies nginx.conf", multiDockerfile, "COPY nginx.conf /app/code/nginx.conf");
    assertNotIncludes("multi docker: no python3 healthcheck install", multiDockerfile, "Install python3");

    // ========================================
    // generateManifest — multi-service SSO
    // ========================================
    addSuite("generateManifest — multi-service SSO");

    // Mixed SSO: one proxyAuth, one none
    const multiSsoConfig = {
      id: "com.example.multi",
      title: "Multi App",
      version: "1.0.0",
      httpPort: 8000,
      healthCheckPath: "/",
      hasWebUI: true,
      database: null,
      sso: null,
      addons: ["localstorage"],
      tcpPorts: [],
      udpPorts: [],
      author: "",
      tagline: "",
      description: "",
      services: [
        { name: "app1", command: "cmd1", internalPort: 3001, routePath: "/app1", sso: "proxyAuth" },
        { name: "app2", command: "cmd2", internalPort: 3002, routePath: "/app2", sso: "none" },
      ],
    };
    const multiSsoManifest = JSON.parse(generateManifest(multiSsoConfig));
    assert("multi sso: proxyAuth addon present", multiSsoManifest.addons.proxyAuth !== undefined, true);
    assertIncludes("multi sso: excludes /app2", JSON.stringify(multiSsoManifest.addons.proxyAuth), "!/app2");
    assert("multi sso: no optionalSso", multiSsoManifest.optionalSso, undefined);

    // All proxyAuth
    const allSsoConfig = {
      id: "com.example.allsso",
      title: "All SSO",
      version: "1.0.0",
      httpPort: 8000,
      healthCheckPath: "/",
      hasWebUI: true,
      database: null,
      sso: null,
      addons: [],
      tcpPorts: [],
      udpPorts: [],
      author: "",
      tagline: "",
      description: "",
      services: [
        { name: "a", command: "c", internalPort: 3001, routePath: "/a", sso: "proxyAuth" },
        { name: "b", command: "d", internalPort: 3002, routePath: "/b", sso: "proxyAuth" },
      ],
    };
    const allSsoManifest = JSON.parse(generateManifest(allSsoConfig));
    assert("all sso: proxyAuth present", allSsoManifest.addons.proxyAuth !== undefined, true);
    assert("all sso: no path exclusion", allSsoManifest.addons.proxyAuth.path, undefined);

    // No SSO services
    const noSsoServicesConfig = {
      id: "com.example.nosso",
      title: "No SSO",
      version: "1.0.0",
      httpPort: 8000,
      healthCheckPath: "/",
      hasWebUI: true,
      database: null,
      sso: null,
      addons: [],
      tcpPorts: [],
      udpPorts: [],
      author: "",
      tagline: "",
      description: "",
      services: [
        { name: "a", command: "c", internalPort: 3001, routePath: "/a", sso: "none" },
      ],
    };
    const noSsoServicesManifest = JSON.parse(generateManifest(noSsoServicesConfig));
    assert("no sso services: no proxyAuth addon", noSsoServicesManifest.addons.proxyAuth, undefined);

    // ========================================
    // generateReadme — pre-flight checks
    // ========================================
    addSuite("generateReadme — pre-flight checks");

    const preflightReadme = generateReadme({ id: "com.example.test", title: "Test", hasWebUI: true });
    assertIncludes("readme: pre-flight section", preflightReadme, "Pre-flight Checks");
    assertIncludes("readme: id cloudron check", preflightReadme, "id cloudron");
    assertIncludes("readme: gosu whoami check", preflightReadme, "gosu cloudron:cloudron whoami");

    // ========================================
    // Summary
    // ========================================
    const total = passed + failed;
    const summaryText = passed + "/" + total + " tests passed" + (failed > 0 ? ", " + failed + " FAILED" : "");
    const summaryEl = document.createTextNode(summaryText);
    summary.appendChild(summaryEl);
    if (failed === 0) {
      summary.className = "all-pass";
    } else {
      summary.className = "has-fail";
    }
  </script>
</body>
</html>
