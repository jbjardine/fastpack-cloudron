<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPackCloudron</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --fp-primary: #0F766E;
      --fp-primary-hover: #0D6960;
      --fp-primary-light: #CCFBF1;
      --fp-accent: #EA580C;
      --fp-accent-hover: #C2410C;
      --fp-bg: #F8FAFC;
      --fp-surface: #FFFFFF;
      --fp-text: #1E293B;
      --fp-text-muted: #64748B;
      --fp-border: #E2E8F0;
      --fp-success: #16A34A;
      --fp-error: #DC2626;
      --fp-warning: #92400E;
    }

    /* ===== Dark Mode ===== */
    @media (prefers-color-scheme: dark) {
      :root {
        --fp-primary: #2DD4BF;
        --fp-primary-hover: #5EEAD4;
        --fp-primary-light: #134E4A;
        --fp-accent: #FB923C;
        --fp-accent-hover: #FDBA74;
        --fp-bg: #0F172A;
        --fp-surface: #1E293B;
        --fp-text: #F1F5F9;
        --fp-text-muted: #94A3B8;
        --fp-border: #334155;
        --fp-success: #4ADE80;
        --fp-error: #F87171;
        --fp-warning: #FBBF24;
      }
      input, select, textarea { background: #1E293B; color: #F1F5F9; border-color: #475569; }
      pre { background: #020617; }
    }

    /* ===== Reduced Motion ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== Base ===== */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--fp-bg);
      color: var(--fp-text);
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      line-height: 1.5;
    }

    /* ===== Layout ===== */
    .fp-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem;
    }

    .fp-advanced-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 2rem;
    }

    /* ===== Header ===== */
    .fp-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .fp-header h1 {
      color: var(--fp-primary);
      margin: 0 0 0.25rem;
      font-size: 1.75rem;
    }

    .fp-header p {
      color: var(--fp-text-muted);
      margin: 0;
    }

    /* ===== Form Elements ===== */
    .fp-field {
      margin-bottom: 1.25rem;
    }

    .fp-field label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.25rem;
      font-size: 0.9rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--fp-border);
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.15s ease;
      background: var(--fp-surface);
      color: var(--fp-text);
    }

    input:hover, select:hover, textarea:hover {
      border-color: var(--fp-primary);
    }

    input:focus-visible, select:focus-visible, textarea:focus-visible,
    button:focus-visible, [role="tab"]:focus-visible {
      outline: 3px solid var(--fp-primary);
      outline-offset: 2px;
    }

    .fp-field-error {
      color: var(--fp-error);
      font-size: 0.85rem;
      display: block;
      min-height: 1.2em;
    }

    /* ===== Checkbox / Radio Grids ===== */
    .fp-checkbox-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
    }

    .fp-checkbox-grid label {
      font-weight: normal;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
    }

    .fp-checkbox-grid input[type="checkbox"],
    .fp-checkbox-grid input[type="radio"] {
      width: auto;
    }

    .fp-radio-group {
      display: flex;
      gap: 1rem;
    }

    .fp-radio-group label {
      font-weight: normal;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      cursor: pointer;
    }

    /* ===== Guided Mode: Option Cards ===== */
    .fp-option-card {
      border: 1px solid var(--fp-border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      background: var(--fp-surface);
    }

    .fp-option-card label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .fp-option-card input[type="checkbox"] {
      width: auto;
    }

    .fp-option-detail {
      margin-top: 0.75rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--fp-border);
    }

    /* ===== Live Summary Card ===== */
    .fp-summary {
      background: var(--fp-primary-light);
      border: 1px solid var(--fp-primary);
      border-radius: 8px;
      padding: 1rem;
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }

    .fp-summary-title {
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--fp-primary);
    }

    .fp-summary-item {
      display: inline-block;
      margin-right: 1rem;
      color: var(--fp-text);
    }

    /* ===== CTA Button ===== */
    .fp-cta {
      background: var(--fp-accent);
      color: white;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 1.5rem;
      transition: background 0.15s ease;
    }

    .fp-cta:hover { background: var(--fp-accent-hover); }
    .fp-cta:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ===== Mode Toggle Link ===== */
    .fp-mode-toggle {
      text-align: center;
      margin: 1rem 0;
    }

    .fp-mode-toggle a {
      color: var(--fp-primary);
      cursor: pointer;
      text-decoration: underline;
      font-size: 0.9rem;
    }

    .fp-mode-toggle a:hover { color: var(--fp-primary-hover); }

    /* ===== Advanced Mode: Sidebar ===== */
    .fp-sidebar {
      position: sticky;
      top: 1rem;
      align-self: start;
    }

    .fp-sidebar-search {
      margin-bottom: 1rem;
    }

    .fp-sidebar-search input {
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
    }

    .fp-nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .fp-nav li {
      margin-bottom: 0.25rem;
    }

    .fp-nav a {
      display: block;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      text-decoration: none;
      color: var(--fp-text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      border-left: 3px solid transparent;
    }

    .fp-nav a:hover {
      background: var(--fp-primary-light);
      color: var(--fp-text);
    }

    .fp-nav a.active {
      color: var(--fp-primary);
      border-left-color: var(--fp-primary);
      font-weight: 600;
    }

    .fp-nav-summary {
      margin-top: 1rem;
      padding: 0.75rem;
      background: var(--fp-primary-light);
      border-radius: 6px;
      font-size: 0.8rem;
    }

    /* ===== Section Headers (Advanced) ===== */
    .fp-section {
      scroll-margin-top: 1rem;
      margin-bottom: 2rem;
    }

    .fp-section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--fp-primary);
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--fp-border);
      margin-bottom: 1rem;
    }

    /* ===== Dynamic Rows (ports, services, etc.) ===== */
    .fp-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
    }

    .fp-row input, .fp-row select {
      flex: 1;
      min-width: 0;
    }

    .fp-remove-btn {
      background: none;
      border: none;
      color: var(--fp-error);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0.25rem;
      flex-shrink: 0;
    }

    .fp-add-btn {
      background: transparent;
      border: 1px dashed var(--fp-border);
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 4px;
      color: var(--fp-text-muted);
      font-size: 0.85rem;
      transition: border-color 0.15s;
    }

    .fp-add-btn:hover { border-color: var(--fp-primary); color: var(--fp-text); }

    /* ===== Preview Tabs ===== */
    .fp-preview-header {
      display: flex;
      align-items: center;
      border-bottom: 2px solid var(--fp-border);
    }

    .fp-preview-tabs {
      display: flex;
      gap: 0;
      flex: 1;
      overflow-x: auto;
    }

    .fp-preview-tab {
      padding: 0.5rem 1rem;
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-size: 0.85rem;
      white-space: nowrap;
      color: var(--fp-text-muted);
    }

    .fp-preview-tab.active {
      border-bottom-color: var(--fp-primary);
      color: var(--fp-primary);
      font-weight: 600;
    }

    .fp-copy-btn {
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--fp-border);
      border-radius: 4px;
      background: var(--fp-surface);
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: auto;
      white-space: nowrap;
      color: var(--fp-text);
    }

    .fp-copy-btn:hover { background: var(--fp-bg); }

    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 1rem;
      border-radius: 0 0 4px 4px;
      overflow-x: auto;
      font-size: 0.85rem;
      margin-top: 0;
      min-height: 100px;
    }

    /* ===== Deploy Wizard ===== */
    .fp-deploy-wizard {
      border: 2px solid var(--fp-success);
      border-radius: 8px;
      padding: 1.25rem;
      margin-top: 1.25rem;
      background: var(--fp-surface);
    }

    .fp-deploy-wizard-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .fp-deploy-wizard-icon { font-size: 1.2rem; }

    .fp-deploy-wizard-close {
      margin-left: auto;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--fp-text-muted);
    }

    .fp-deploy-wizard-subtitle {
      color: var(--fp-text-muted);
      margin: 0 0 1rem;
      font-size: 0.9rem;
    }

    .fp-deploy-wizard-steps {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .fp-deploy-wizard-step {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .fp-deploy-wizard-num {
      background: var(--fp-primary);
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .fp-deploy-wizard-label {
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .fp-deploy-wizard-cmd {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin: 0.25rem 0;
      cursor: pointer;
      user-select: all;
      white-space: pre;
      overflow-x: auto;
    }

    .fp-deploy-wizard-cmd:hover { outline: 2px solid var(--fp-primary); }

    .fp-deploy-wizard-copy {
      font-size: 0.75rem;
      color: var(--fp-text-muted);
    }

    .fp-deploy-wizard-details {
      margin-top: 1rem;
      font-size: 0.85rem;
    }

    .fp-deploy-wizard-details summary {
      cursor: pointer;
      color: var(--fp-primary);
    }
    .fp-deploy-os-active {
      outline: 2px solid var(--fp-primary);
      font-weight: 600;
    }

    /* ===== Warnings & Errors ===== */
    .fp-warning {
      background: #fff3cd;
      color: var(--fp-warning);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .fp-error {
      background: #fee;
      color: var(--fp-error);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }

    @media (prefers-color-scheme: dark) {
      .fp-warning { background: #451A03; }
      .fp-error { background: #450A0A; }
    }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      margin-top: 2rem;
      padding: 1rem;
      color: var(--fp-text-muted);
      font-size: 0.85rem;
    }

    footer a { color: var(--fp-primary); }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .fp-advanced-layout {
        grid-template-columns: 1fr;
        padding: 1rem;
      }

      .fp-sidebar {
        position: static;
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--fp-border);
        padding-bottom: 0.75rem;
      }

      .fp-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
      }

      .fp-nav a {
        border-left: none;
        border-bottom: 2px solid transparent;
        padding: 0.3rem 0.6rem;
        font-size: 0.8rem;
      }

      .fp-nav a.active { border-bottom-color: var(--fp-primary); border-left: none; }

      .fp-nav-summary { display: none; }

      .fp-container { padding: 1rem; }

      .fp-row { flex-wrap: wrap; }
    }

    @media (max-width: 480px) {
      .fp-header h1 { font-size: 1.3rem; }
      .fp-cta { font-size: 1rem; padding: 0.75rem 1.5rem; }
    }

    /* ===== Utility ===== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body>

<!-- ======================== GUIDED MODE ======================== -->
<div x-data="fpApp()" x-cloak>

  <template x-if="isGuided">
    <div class="fp-container">
      <header class="fp-header">
        <h1>FastPackCloudron</h1>
        <p>Generate Cloudron custom app packages in 3 clicks</p>
      </header>

      <main>
        <!-- Docker Image (only required field) -->
        <div class="fp-field">
          <label for="guided-image">Docker Image</label>
          <input type="text" id="guided-image" x-model="image" placeholder="e.g., nginx:latest" aria-describedby="err-guided-image">
          <span class="fp-field-error" id="err-guided-image" x-text="errorFor('image')"></span>
        </div>

        <!-- Progressive Disclosure Options -->
        <div class="fp-option-card">
          <label>
            <input type="checkbox" x-model="_showDatabase">
            Add a database
          </label>
          <div class="fp-option-detail" x-show="_showDatabase" x-transition>
            <select x-model="database" aria-label="Database type">
              <option value="">None</option>
              <option value="postgresql">PostgreSQL</option>
              <option value="mysql">MySQL</option>
              <option value="mongodb">MongoDB</option>
              <option value="redis">Redis</option>
            </select>
          </div>
        </div>

        <div class="fp-option-card">
          <label>
            <input type="checkbox" x-model="_showAuth">
            Enable authentication (SSO)
          </label>
          <div class="fp-option-detail" x-show="_showAuth" x-transition>
            <select x-model="sso" aria-label="SSO type">
              <option value="">None</option>
              <option value="proxyAuth">ProxyAuth</option>
              <option value="oidc">OIDC</option>
              <option value="ldap">LDAP</option>
              <option value="oauth">OAuth</option>
              <option value="simpleauth">SimpleAuth</option>
            </select>
          </div>
        </div>

        <div class="fp-option-card">
          <label>
            <input type="checkbox" x-model="_showPort">
            Change HTTP port
          </label>
          <div class="fp-option-detail" x-show="_showPort" x-transition>
            <input type="number" x-model="httpPort" placeholder="8000" aria-label="HTTP Port">
          </div>
        </div>

        <div class="fp-option-card">
          <label>
            <input type="checkbox" x-model="_showStack">
            Choose application stack
          </label>
          <div class="fp-option-detail" x-show="_showStack" x-transition>
            <select x-model="stack" aria-label="Application stack">
              <option value="">Generic (manual)</option>
              <option value="nodejs">Node.js</option>
              <option value="php">Apache + PHP</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="go">Go</option>
            </select>
          </div>
        </div>

        <div class="fp-option-card">
          <label>
            <input type="checkbox" x-model="_showSubcontainer">
            Add a 2nd Docker app (sub-container)
          </label>
          <div class="fp-option-detail" x-show="_showSubcontainer" x-transition>
            <template x-for="(sub, i) in subcontainers" :key="i">
              <div class="fp-row">
                <input type="text" x-model="sub.image" placeholder="Docker image (e.g., n8nio/n8n)">
                <input type="number" x-model="sub.port" placeholder="Port">
                <input type="text" x-model="sub.route" placeholder="Route (e.g., /n8n)">
                <button type="button" class="fp-remove-btn" @click="removeSubcontainer(i)" aria-label="Remove sub-container">&times;</button>
              </div>
            </template>
            <button type="button" class="fp-add-btn" @click="addSubcontainer()">Add sub-container</button>
          </div>
        </div>

        <!-- Live Summary -->
        <div class="fp-summary" aria-live="polite">
          <div class="fp-summary-title">Summary</div>
          <template x-for="item in summary" :key="item">
            <span class="fp-summary-item" x-text="item"></span>
          </template>
        </div>

        <!-- Warnings -->
        <div role="status" aria-live="polite">
          <template x-for="w in _warnings" :key="w.message">
            <div class="fp-warning" x-text="w.message"></div>
          </template>
        </div>

        <!-- Errors -->
        <div role="alert" aria-live="assertive">
          <template x-for="e in _errors" :key="e.message">
            <div class="fp-error" x-text="e.message"></div>
          </template>
        </div>

        <!-- Download Button -->
        <button type="button" class="fp-cta" @click="downloadZip()" :disabled="_downloading" :aria-busy="_downloading">
          <span x-text="_downloading ? 'Generating...' : 'Download ZIP'"></span>
        </button>

        <!-- Deploy Wizard (shown after download) -->
        <div class="fp-deploy-wizard" x-show="_showDeployWizard" x-transition aria-live="polite">
          <div class="fp-deploy-wizard-header">
            <span class="fp-deploy-wizard-icon">&#9989;</span>
            <strong>Package downloaded!</strong>
            <button type="button" class="fp-deploy-wizard-close" @click="_showDeployWizard = false" aria-label="Close">&times;</button>
          </div>
          <p class="fp-deploy-wizard-subtitle">Deploy to your Cloudron in 2 steps:</p>
          <div class="fp-deploy-wizard-steps">
            <div class="fp-deploy-wizard-step">
              <span class="fp-deploy-wizard-num">1</span>
              <div>
                <div class="fp-deploy-wizard-label">Extract the ZIP and open a terminal in the folder</div>
              </div>
            </div>
            <div class="fp-deploy-wizard-step">
              <span class="fp-deploy-wizard-num">2</span>
              <div>
                <div class="fp-deploy-wizard-label">Run the FastPack Deploy CLI</div>
                <pre class="fp-deploy-wizard-cmd" @click="navigator.clipboard?.writeText(_deployCmd).catch(() => {})" x-text="_deployCmd"></pre>
                <span class="fp-deploy-wizard-copy">click to copy</span>
              </div>
            </div>
          </div>
          <details class="fp-deploy-wizard-details">
            <summary>Download the FastPack Deploy CLI</summary>
            <p style="font-size:0.85rem;margin-bottom:0.5rem;">No Node.js or Docker required. Download for your platform:</p>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
              <a x-bind:class="{ 'fp-deploy-os-active': _detectedOS === 'windows' }" class="fp-deploy-wizard-cmd" style="display:inline-block;padding:0.3rem 0.8rem;cursor:pointer;text-decoration:none;" href="./bin/fastpack-deploy-windows-amd64.exe" download target="_blank" rel="noopener">Windows (x64)</a>
              <a x-bind:class="{ 'fp-deploy-os-active': _detectedOS === 'linux' }" class="fp-deploy-wizard-cmd" style="display:inline-block;padding:0.3rem 0.8rem;cursor:pointer;text-decoration:none;" href="./bin/fastpack-deploy-linux-amd64" download target="_blank" rel="noopener">Linux (x64)</a>
              <a x-bind:class="{ 'fp-deploy-os-active': _detectedOS === 'macos-arm' }" class="fp-deploy-wizard-cmd" style="display:inline-block;padding:0.3rem 0.8rem;cursor:pointer;text-decoration:none;" href="./bin/fastpack-deploy-darwin-arm64" download target="_blank" rel="noopener">macOS (Apple Silicon)</a>
              <a x-bind:class="{ 'fp-deploy-os-active': _detectedOS === 'macos-intel' }" class="fp-deploy-wizard-cmd" style="display:inline-block;padding:0.3rem 0.8rem;cursor:pointer;text-decoration:none;" href="./bin/fastpack-deploy-darwin-amd64" download target="_blank" rel="noopener">macOS (Intel)</a>
            </div>
            <p style="font-size:0.8rem;color:var(--fp-text-muted);margin-top:0.5rem;">Place the binary in your extracted ZIP folder, then run the command above. See <a href="https://docs.cloudron.io/packaging/cli/" target="_blank" rel="noopener">Cloudron docs</a>.</p>
          </details>
          <details class="fp-deploy-wizard-details" style="margin-top:0.5rem;">
            <summary>Alternative: use the official Cloudron CLI</summary>
            <pre class="fp-deploy-wizard-cmd" @click="navigator.clipboard?.writeText('cloudron login my.example.com\ncloudron install').catch(() => {})">cloudron login my.example.com
cloudron install</pre>

              <label for="adv-checklist">Post-Install Checklist (one item per line)</label>
              <textarea id="adv-checklist" x-model="checklist" placeholder="Change default admin password&#10;Configure email settings" rows="3"></textarea>
            </div>
          </div>

          <!-- ── Publishing ── -->
          <div class="fp-section" id="section-publishing" x-show="matchesSearch('Publishing Docker Hub Packager Icon Media Documentation Forum')">
            <div class="fp-section-title">Publishing</div>
            <div class="fp-field">
              <label for="adv-docker-hub">Docker Hub Username</label>
              <input type="text" id="adv-docker-hub" x-model="dockerHubUsername" placeholder="e.g., jbjardine">
            </div>
            <div class="fp-field">
              <label for="adv-packager-name">Packager Name</label>
              <input type="text" id="adv-packager-name" x-model="packagerName" placeholder="Your Name or Org">
            </div>
            <div class="fp-field">
              <label for="adv-packager-url">Packager URL</label>
              <input type="text" id="adv-packager-url" x-model="packagerUrl" placeholder="https://example.com/about">
            </div>
            <div class="fp-field">
              <label for="adv-icon-url">Icon URL</label>
              <input type="text" id="adv-icon-url" x-model="iconUrl" placeholder="https://example.com/icon.png">
            </div>
            <div class="fp-field">
              <label for="adv-media-links">Media Links (one URL per line)</label>
              <textarea id="adv-media-links" x-model="mediaLinks" placeholder="https://example.com/screenshot1.png" rows="2"></textarea>
            </div>
            <div class="fp-field">
              <label for="adv-doc-url">Documentation URL</label>
              <input type="text" id="adv-doc-url" x-model="documentationUrl" placeholder="https://docs.example.com">
            </div>
            <div class="fp-field">
              <label for="adv-forum-url">Forum URL</label>
              <input type="text" id="adv-forum-url" x-model="forumUrl" placeholder="https://forum.cloudron.io/topic/...">
            </div>
          </div>

          <!-- Warnings -->
          <div role="status" aria-live="polite">
            <template x-for="w in _warnings" :key="w.message">
              <div class="fp-warning" x-text="w.message"></div>
            </template>
          </div>

          <!-- Errors -->
          <div role="alert" aria-live="assertive">
            <template x-for="e in _errors" :key="e.message">
              <div class="fp-error" x-text="e.message"></div>
            </template>
          </div>

          <!-- Actions -->
          <div style="display:flex;gap:1rem;align-items:center;margin-top:1.5rem;">
            <button type="button" class="fp-cta" style="flex:1;" @click="downloadZip()" :disabled="_downloading">
              <span x-text="_downloading ? 'Generating...' : 'Download ZIP'"></span>
            </button>
            <a @click="switchToGuided()" style="color:var(--fp-primary);cursor:pointer;white-space:nowrap;" role="button" tabindex="0" @keydown.enter="switchToGuided()">Guided mode</a>
          </div>

          <!-- Deploy Wizard (shown after download) -->
          <div class="fp-deploy-wizard" x-show="_showDeployWizard" x-transition aria-live="polite">
            <div class="fp-deploy-wizard-header">
              <span class="fp-deploy-wizard-icon">&#9989;</span>
              <strong>Package downloaded!</strong>
              <button type="button" class="fp-deploy-wizard-close" @click="_showDeployWizard = false" aria-label="Close">&times;</button>
            </div>
            <p class="fp-deploy-wizard-subtitle">Deploy to your Cloudron in 2 steps:</p>
            <div class="fp-deploy-wizard-steps">
              <div class="fp-deploy-wizard-step">
                <span class="fp-deploy-wizard-num">1</span>
                <div>
                  <div class="fp-deploy-wizard-label">Extract the ZIP and open a terminal in the folder</div>
                </div>
              </div>
              <div class="fp-deploy-wizard-step">
                <span class="fp-deploy-wizard-num">2</span>
                <div>
                  <div class="fp-deploy-wizard-label">Run the FastPack Deploy CLI</div>
                  <pre class="fp-deploy-wizard-cmd" @click="navigator.clipboard?.writeText(_deployCmd).catch(() => {})" x-text="_deployCmd"></pre>
                  <span class="fp-deploy-wizard-copy">click to copy</span>
                </div>
              </div>
            </div>
            <details class="fp-deploy-wizard-details">
              <summary>Download the FastPack Deploy CLI</summary>
              <p style="font-size:0.85rem;margin-bottom:0.5rem;">No Node.js or Docker required. Download for your platform:</p>
              <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                <a x-bind:class="{ 'fp-deploy-os-active': _detectedOS === 'windows' }" class="fp-deploy-wizard-cmd" style="display:inline-block;padding:0.3rem 0.8rem;cursor:pointer;text-decoration:none;" href="./bin/fastpack-deploy-windows-amd64.exe" download target="_blank" rel="noopener">Windows (x64)</a>
                <a x-bind:class="{ 'fp-deploy-os-active': _detectedOS === 'linux' }" class="fp-deploy-wizard-cmd" style="display:inline-block;padding:0.3rem 0.8rem;cursor:pointer;text-decoration:none;" href="./bin/fastpack-deploy-linux-amd64" download target="_blank" rel="noopener">Linux (x64)</a>
                <a x-bind:class="{ 'fp-deploy-os-active': _detectedOS === 'macos-arm' }" class="fp-deploy-wizard-cmd" style="display:inline-block;padding:0.3rem 0.8rem;cursor:pointer;text-decoration:none;" href="./bin/fastpack-deploy-darwin-arm64" download target="_blank" rel="noopener">macOS (Apple Silicon)</a>
                <a x-bind:class="{ 'fp-deploy-os-active': _detectedOS === 'macos-intel' }" class="fp-deploy-wizard-cmd" style="display:inline-block;padding:0.3rem 0.8rem;cursor:pointer;text-decoration:none;" href="./bin/fastpack-deploy-darwin-amd64" download target="_blank" rel="noopener">macOS (Intel)</a>
              </div>
              <p style="font-size:0.8rem;color:var(--fp-text-muted);margin-top:0.5rem;">Place the binary in your extracted ZIP folder, then run the command above. See <a href="https://docs.cloudron.io/packaging/cli/" target="_blank" rel="noopener">Cloudron docs</a>.</p>
            </details>
            <details class="fp-deploy-wizard-details" style="margin-top:0.5rem;">
              <summary>Alternative: use the official Cloudron CLI</summary>
              <pre class="fp-deploy-wizard-cmd" @click="navigator.clipboard?.writeText('cloudron login my.example.com\ncloudron install').catch(() => {})">cloudron login my.example.com
cloudron install</pre>
              <p style="font-size:0.8rem;color:var(--fp-text-muted);margin-top:0.5rem;">Requires <a href="https://nodejs.org" target="_blank" rel="noopener">Node.js</a>: <code>npm install -g cloudron</code></p>
            </details>
          </div>

          <!-- Preview Tabs -->
          <section aria-label="Generated files preview" style="margin-top:2rem;">
            <div class="fp-preview-header">
              <div class="fp-preview-tabs" role="tablist" aria-label="Generated files">
                <template x-for="t in PREVIEW_TABS" :key="t.key">
                  <button class="fp-preview-tab" role="tab"
                          :class="{ active: _activeTab === t.key }"
                          :aria-selected="String(_activeTab === t.key)"
                          :tabindex="_activeTab === t.key ? 0 : -1"
                          @click="setTab(t.key)"
                          @keydown.arrow-right.prevent="navigateTab(t.key, 'next')"
                          @keydown.arrow-left.prevent="navigateTab(t.key, 'prev')"
                          x-text="t.label">
                  </button>
                </template>
                <button class="fp-preview-tab" role="tab"
                        x-show="showNginxTab"
                        :class="{ active: _activeTab === 'nginx' }"
                        :aria-selected="String(_activeTab === 'nginx')"
                        :tabindex="_activeTab === 'nginx' ? 0 : -1"
                        @click="setTab('nginx')"
                        @keydown.arrow-right.prevent="navigateTab('nginx', 'next')"
                        @keydown.arrow-left.prevent="navigateTab('nginx', 'prev')">nginx.conf</button>
              </div>
              <button class="fp-copy-btn" @click="copyPreview()" x-text="_copyFeedback || 'Copy'"></button>
            </div>
            <pre role="tabpanel" aria-label="Preview content"><code x-text="activePreview"></code></pre>
          </section>
        </main>
      </div>

      <footer>
        <p>Powered by <a href="https://cloudron.io">Cloudron</a> &mdash; <a href="https://docs.cloudron.io/packaging/">Packaging docs</a></p>
      </footer>
    </div>
  </template>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2/dist/FileSaver.min.js" integrity="sha384-PlRSzpewlarQuj5alIadXwjNUX+2eNMKwr0f07ShWYLy8B6TjEbm7ZlcN/ScSbwy" crossorigin="anonymous"></script>
<script type="module">
  import { fpApp } from './app.js';
  window.fpApp = fpApp;
</script>
<script src="vendor/alpine.3.14.9.min.js" defer></script>
</body>
</html>
