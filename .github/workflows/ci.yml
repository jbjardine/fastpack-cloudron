name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: npm install playwright && npx playwright install chromium --with-deps
      - name: Run unit tests
        run: node test-ci.mjs

  build-tests:
    name: Docker Build Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify Docker is available
        run: docker --version
      - name: Run build tests
        run: node test-build.mjs
