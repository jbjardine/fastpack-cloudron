name: Deploy CLI - Build & Release

on:
  push:
    paths:
      - 'deploy-cli/**'
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Cross-compile Deploy CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: deploy-cli/go.sum

      - name: Run tests
        working-directory: deploy-cli
        run: go test ./... -v -count=1

      - name: Build all platforms
        working-directory: deploy-cli
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o dist/fastpack-deploy-windows-amd64.exe .
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/fastpack-deploy-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o dist/fastpack-deploy-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o dist/fastpack-deploy-darwin-amd64 .
          ls -lh dist/

      - name: Upload binaries
        uses: actions/upload-artifact@v5
        with:
          name: fastpack-deploy-binaries
          path: deploy-cli/dist/
