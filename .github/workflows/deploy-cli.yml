name: Deploy CLI - Build & Release

on:
  push:
    paths:
      - 'deploy-cli/**'
      - '.github/workflows/deploy-cli.yml'
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Cross-compile Deploy CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: deploy-cli/go.sum

      - name: Run tests
        working-directory: deploy-cli
        run: go test ./... -v -count=1

      - name: Build all platforms
        working-directory: deploy-cli
        run: |
          mkdir -p dist
          VERSION="$(sed -n 's/var version = "\(.*\)"/\1/p' main.go)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/fastpack-deploy-windows-amd64.exe .
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/fastpack-deploy-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/fastpack-deploy-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/fastpack-deploy-darwin-amd64 .
          shasum -a 256 dist/* > dist/SHA256SUMS
          ls -lh dist/

      - name: Upload binaries
        uses: actions/upload-artifact@v5
        with:
          name: fastpack-deploy-binaries
          path: deploy-cli/dist/

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: deploy-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
